<!DOCTYPE html>
<html>
<head>
<title>Select Area</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
padding:30px;
}

h1{
margin-bottom:30px;
}

button{
display:block;
width:260px;
height:70px;
font-size:20px;
margin:12px auto;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<button onclick="go('PICKING')">Picking</button>
<button onclick="go('MHE')">MHE</button>
<button onclick="go('INBOUND')">Inbound</button>
<button onclick="go('DESPATCH')">Despatch</button>
<button onclick="go('STOCK')">Stock Controllers</button>
<button onclick="go('SUPERVISORS')">Supervisors</button>
<button onclick="go('MANAGERS')">Managers</button>

<script>

const params = new URLSearchParams(window.location.search)
const site = params.get("site")

document.getElementById("title").innerText = site + " Areas"

function go(area){

const fullArea = site + "_" + area

window.location = "rollcall.html?area=" + fullArea

}

</script>

</body>
</html>
