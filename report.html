<!DOCTYPE html>
<html>
<head>
<title>Drill Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: #f5f5f5;
}

h1{
  text-align: center;
  margin-top: 0;
}

.filters{
  text-align: center;
  margin-bottom: 20px;
}

.filters button{
  margin: 5px;
  padding: 10px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #1976d2;
  color: white;
}

.report{
  max-width: 1000px;
  margin: 12px auto;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
}

.reportHeader{
  padding: 14px;
  font-weight: bold;
  cursor: pointer;
  background: #ececec;
}

.reportSummary{
  font-size: 14px;
  margin-top: 4px;
  font-weight: normal;
}

.reportBody{
  display: none;
  padding: 14px;
}

.reportActions{
  margin: 12px 0;
}

.exportBtn{
  padding: 10px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #4CAF50;
  color: white;
}

table{
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td{
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 13px;
  text-align: left;
}

th{
  background: #f0f0f0;
}

.noReports{
  max-width: 900px;
  margin: 20px auto;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

@media (max-width: 700px){
  table{
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }
}
</style>
</head>

<body>

<h1>📋 Drill Reports</h1>

<div class="filters">
  <button onclick="setFilter('week')">This Week</button>
  <button onclick="setFilter('month')">This Month</button>
  <button onclick="setFilter('year')">This Year</button>
  <button onclick="setFilter('all')">All</button>
</div>

<div id="reports"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
  authDomain: "shunt-queue.firebaseapp.com",
  databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shunt-queue",
  storageBucket: "shunt-queue.appspot.com",
  messagingSenderId: "773776993625",
  appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const reportsRef = ref(db, "drillReports");

let allReports = [];
let currentFilter = "all";

function formatDate(ts){
  return new Date(ts).toLocaleString();
}

function setFilter(type){
  currentFilter = type;
  renderReports();
}

window.setFilter = setFilter;

onValue(reportsRef, (snap) => {
  const data = snap.val() || {};
  allReports = [];

  for(const id in data){
    allReports.push({
      id: id,
      ...data[id]
    });
  }

  allReports.sort((a, b) => (b.startTime || 0) - (a.startTime || 0));
  renderReports();
});

function renderReports(){
  const container = document.getElementById("reports");
  container.innerHTML = "";

  let reports = [...allReports];
  const now = new Date();

  if(currentFilter === "week"){
    const weekAgo = new Date();
    weekAgo.setDate(now.getDate() - 7);
    reports = reports.filter(r => (r.startTime || 0) > weekAgo.getTime());
  }

  if(currentFilter === "month"){
    const monthAgo = new Date();
    monthAgo.setMonth(now.getMonth() - 1);
    reports = reports.filter(r => (r.startTime || 0) > monthAgo.getTime());
  }

  if(currentFilter === "year"){
    const yearAgo = new Date();
    yearAgo.setFullYear(now.getFullYear() - 1);
    reports = reports.filter(r => (r.startTime || 0) > yearAgo.getTime());
  }

  if(reports.length === 0){
    container.innerHTML = '<div class="noReports">No drill reports yet.</div>';
    return;
  }

  reports.forEach(report => {
    const card = document.createElement("div");
    card.className = "report";

    const header = document.createElement("div");
    header.className = "reportHeader";
    header.innerHTML =
      formatDate(report.startTime) + " — " + (report.shift || "-") + " " + (report.team || "-") +
      '<div class="reportSummary">' +
      (report.staffTotal || 0) + ' staff • ' + (report.totalTimeText || '-') +
      '</div>';

    const body = document.createElement("div");
    body.className = "reportBody";

    let rows = "";

    (report.staff || []).forEach(p => {
      rows += `
        <tr>
          <td>${escapeHtml(p.name || "")}</td>
          <td>${escapeHtml(p.site || "")}</td>
          <td>${escapeHtml(p.department || "")}</td>
          <td>${p.safeTime ? formatDate(p.safeTime) : "-"}</td>
        </tr>
      `;
    });

    body.innerHTML = `
      <div><strong>Start:</strong> ${report.startTime ? formatDate(report.startTime) : "-"}</div>
      <div><strong>End:</strong> ${report.endTime ? formatDate(report.endTime) : "-"}</div>
      <div><strong>Total Time:</strong> ${report.totalTimeText || "-"}</div>
      <div><strong>Staff on Site:</strong> ${report.staffTotal || 0}</div>

      <div class="reportActions">
        <button class="exportBtn" data-report-id="${report.id}">Export to PDF</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Site</th>
            <th>Department</th>
            <th>Safe Time</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    `;

    header.onclick = () => {
      body.style.display = body.style.display === "block" ? "none" : "block";
    };

    card.appendChild(header);
    card.appendChild(body);
    container.appendChild(card);

    const exportBtn = body.querySelector(".exportBtn");
    exportBtn.onclick = (e) => {
      e.stopPropagation();
      exportReportToPDF(report);
    };
  });
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function exportReportToPDF(report){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 12;

  doc.setFontSize(16);
  doc.text("Fire Drill Report", 10, y);
  y += 10;

  doc.setFontSize(11);
  doc.text("Shift: " + (report.shift || "-") + " " + (report.team || "-"), 10, y);
  y += 8;
  doc.text("Start: " + (report.startTime ? formatDate(report.startTime) : "-"), 10, y);
  y += 8;
  doc.text("End: " + (report.endTime ? formatDate(report.endTime) : "-"), 10, y);
  y += 8;
  doc.text("Total Time: " + (report.totalTimeText || "-"), 10, y);
  y += 8;
  doc.text("Staff on Site: " + (report.staffTotal || 0), 10, y);
  y += 12;

  doc.setFontSize(10);

  (report.staff || []).forEach((p) => {
    const line = [
      p.name || "",
      p.site || "",
      p.department || "",
      p.safeTime ? formatDate(p.safeTime) : "-"
    ].join(" | ");

    const split = doc.splitTextToSize(line, 180);
    doc.text(split, 10, y);
    y += split.length * 6;

    if(y > 280){
      doc.addPage();
      y = 12;
    }
  });

  const fileName = "fire-drill-report-" + (report.startTime || Date.now()) + ".pdf";
  doc.save(fileName);
}
</script>

</body>
</html>
