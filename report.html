<!DOCTYPE html>
<html>
<head>
<title>Drill Reports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
margin:0;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
margin-top:0;
}

.reportCard{
max-width:900px;
margin:20px auto;
background:white;
border:1px solid #ccc;
border-radius:10px;
padding:16px;
}

.reportTitle{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.reportMeta{
margin:6px 0;
}

.staffTable{
width:100%;
border-collapse:collapse;
margin-top:12px;
}

.staffTable th,
.staffTable td{
border:1px solid #ddd;
padding:8px;
text-align:left;
font-size:14px;
}

.staffTable th{
background:#ececec;
}

.noReports{
max-width:900px;
margin:20px auto;
background:white;
border:1px solid #ccc;
border-radius:10px;
padding:16px;
text-align:center;
}
</style>
</head>

<body>

<h1>📋 Drill Reports</h1>

<div id="reports"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig={
apiKey:"AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain:"shunt-queue.firebaseapp.com",
databaseURL:"https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"shunt-queue",
storageBucket:"shunt-queue.appspot.com",
messagingSenderId:"773776993625",
appId:"1:773776993625:web:2082ee7a38be041bee7048"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const reportsRef=ref(db,"drillReports")

function formatDateTime(ts){
const d=new Date(ts)
return d.toLocaleString()
}

onValue(reportsRef,(snap)=>{

const data=snap.val()||{}
const container=document.getElementById("reports")
container.innerHTML=""

const reports=[]

for(const id in data){
reports.push({
id:id,
...data[id]
})
}

reports.sort((a,b)=>(b.startTime||0)-(a.startTime||0))

if(reports.length===0){
container.innerHTML='<div class="noReports">No drill reports yet.</div>'
return
}

reports.forEach(report=>{

const card=document.createElement("div")
card.className="reportCard"

let staffRows=""

;(report.staff||[]).forEach(person=>{

staffRows+=`
<tr>
<td>${person.name||""}</td>
<td>${person.site||""}</td>
<td>${person.department||""}</td>
<td>${person.safeTime ? formatDateTime(person.safeTime) : ""}</td>
</tr>
`
})

card.innerHTML=`
<div class="reportTitle">Fire Drill Report</div>
<div class="reportMeta"><strong>Shift:</strong> ${report.shift||"-"} Shift ${report.team||"-"}</div>
<div class="reportMeta"><strong>Start Time:</strong> ${report.startTime ? formatDateTime(report.startTime) : "-"}</div>
<div class="reportMeta"><strong>End Time:</strong> ${report.endTime ? formatDateTime(report.endTime) : "-"}</div>
<div class="reportMeta"><strong>Total Time:</strong> ${report.totalTimeText||"-"}</div>
<div class="reportMeta"><strong>Staff on Site:</strong> ${report.staffTotal||0}</div>

<table class="staffTable">
<thead>
<tr>
<th>Name</th>
<th>Site</th>
<th>Department</th>
<th>Marked Safe</th>
</tr>
</thead>
<tbody>
${staffRows}
</tbody>
</table>
`

container.appendChild(card)

})

})

</script>

</body>
</html>
