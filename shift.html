<!DOCTYPE html>
<html>
<head>

<title>Shift Setup</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
margin-top:0;
}

.section{
max-width:900px;
margin:20px auto;
background:white;
border:1px solid #ccc;
border-radius:10px;
padding:15px;
}

.staffRow{
border:1px solid #ddd;
border-radius:6px;
margin:6px 0;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.removeBtn{
background:#d32f2f;
color:white;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
}

.addBtn{
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
padding:10px 16px;
cursor:pointer;
margin-top:10px;
}

.searchBox{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.staffCheckbox{
margin-right:8px;
}

</style>

</head>

<body>

<h1>Shift Setup</h1>

<div class="section">

<h2>Active Staff (Currently On Site)</h2>

<div id="activeStaff"></div>

</div>

<div class="section">

<h2>Add Staff To Shift</h2>

<input
id="searchBox"
class="searchBox"
placeholder="Search staff..."
onkeyup="filterStaff()"
/>

<div id="staffList"></div>

<button class="addBtn" onclick="addSelected()">
Add Selected Staff
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig={
apiKey:"AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain:"shunt-queue.firebaseapp.com",
databaseURL:"https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"shunt-queue",
storageBucket:"shunt-queue.appspot.com",
messagingSenderId:"773776993625",
appId:"1:773776993625:web:2082ee7a38be041bee7048"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const staffRef=ref(db,"staff")
const activeRef=ref(db,"activeShift")

let staffData={}
let activeData={}

onValue(staffRef,(snap)=>{

staffData=snap.val()||{}
renderStaffList()

})

onValue(activeRef,(snap)=>{

activeData=snap.val()||{}
renderActiveStaff()

})

function renderActiveStaff(){

const container=document.getElementById("activeStaff")

container.innerHTML=""

for(const id in activeData){

const person=activeData[id]

const row=document.createElement("div")
row.className="staffRow"

row.innerHTML=`
<div>
${person.name} — ${person.site} / ${person.department}
</div>

<button class="removeBtn" onclick="removePerson('${id}')">
Remove
</button>
`

container.appendChild(row)

}

if(Object.keys(activeData).length===0){

container.innerHTML="<i>No staff currently on shift</i>"

}

}

window.removePerson=async function(id){

await remove(ref(db,"activeShift/"+id))

}

function renderStaffList(){

const container=document.getElementById("staffList")

container.innerHTML=""

for(const id in staffData){

const person=staffData[id]

const row=document.createElement("div")
row.className="staffRow"
row.dataset.name=person.name.toLowerCase()

row.innerHTML=`
<label>

<input
type="checkbox"
class="staffCheckbox"
data-id="${id}"
data-name="${person.name}"
data-site="${person.site}"
data-department="${person.department}"
>

${person.name} — ${person.site} / ${person.department}

</label>
`

container.appendChild(row)

}

}

window.filterStaff=function(){

const search=document.getElementById("searchBox").value.toLowerCase()

const rows=document.querySelectorAll("#staffList .staffRow")

rows.forEach(r=>{

if(r.dataset.name.includes(search)){
r.style.display="flex"
}else{
r.style.display="none"
}

})

}

window.addSelected=async function(){

const boxes=document.querySelectorAll(".staffCheckbox:checked")

for(const box of boxes){

const id=box.dataset.id

await update(ref(db,"activeShift/"+id),{

name:box.dataset.name,
site:box.dataset.site,
department:box.dataset.department,
safe:false,
safeTime:null

})

box.checked=false

}

alert("Staff added to shift")

}

</script>

</body>
</html>
