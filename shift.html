<!DOCTYPE html>
<html>
<head>
<title>Shift Roster</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
padding:20px;
text-align:center;
}

select, input{
width:220px;
height:40px;
font-size:16px;
margin:8px;
}

button{
height:40px;
font-size:16px;
margin:6px;
}

.staffRow{
border:1px solid #ccc;
margin:6px;
padding:8px;
font-size:15px;
}

</style>

</head>

<body>

<h1>Shift Roster</h1>

<select id="shift">
<option value="Days">Days</option>
<option value="Nights">Nights</option>
</select>

<select id="team">
<option value="A">Shift A</option>
<option value="B">Shift B</option>
</select>

<br>

<button onclick="activateShift()">Activate Shift</button>

<h2>Search Staff</h2>

<input id="searchBox" placeholder="Search name" onkeyup="searchStaff()">

<div id="searchResults"></div>

<h2>Add Temporary Worker</h2>

<input id="tempName" placeholder="Name">

<input id="tempDept" placeholder="Department">

<button onclick="addTemp()">Add Temporary</button>

<h2>Staff Currently On Site</h2>

<div id="roster"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const staffRef = ref(db,"fireStaff")
const rosterRef = ref(db,"activeShift")
const shiftInfoRef = ref(db,"shiftInfo")

let staffData = {}

onValue(staffRef,(snapshot)=>{
staffData = snapshot.val() || {}
})

window.activateShift=function(){

const shift=document.getElementById("shift").value
const team=document.getElementById("team").value

set(shiftInfoRef,{
shift:shift,
team:team
})

alert("Shift Activated")

}

window.searchStaff=function(){

const search=document.getElementById("searchBox").value.toLowerCase()

const results=document.getElementById("searchResults")
results.innerHTML=""

if(search.length<2) return

for(const id in staffData){

const person=staffData[id]

if(person.name.toLowerCase().includes(search)){

const row=document.createElement("div")
row.className="staffRow"

row.innerHTML=person.name+" — "+person.department+
' <button onclick="addToRoster(\''+person.name+'\',\''+person.department+'\',\''+person.site+'\')">Add</button>'

results.appendChild(row)

}

}

}

window.addToRoster=function(name,dept,site){

push(rosterRef,{
name:name,
department:dept,
site:site,
safe:false
})

}

window.addTemp=function(){

const name=document.getElementById("tempName").value
const dept=document.getElementById("tempDept").value

if(name==="") return

push(rosterRef,{
name:name,
department:dept,
site:"TEMP",
safe:false
})

document.getElementById("tempName").value=""
document.getElementById("tempDept").value=""

}

onValue(rosterRef,(snapshot)=>{

const data=snapshot.val()

const list=document.getElementById("roster")
list.innerHTML=""

if(!data) return

for(const id in data){

const row=document.createElement("div")
row.className="staffRow"

row.innerHTML=data[id].name+" — "+data[id].department+
' <button onclick="removeStaff(\''+id+'\')">Remove</button>'

list.appendChild(row)

}

})

window.removeStaff=function(id){
remove(ref(db,"activeShift/"+id))
}

</script>

</body>
</html>
