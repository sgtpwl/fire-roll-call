<!DOCTYPE html>
<html>
<head>
<title>Shift Roster</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
  text-align:center;
  margin:0;
}

h1,h2,h3{
  margin:12px 0;
}

select,input{
  width:260px;
  height:42px;
  font-size:16px;
  margin:8px;
  padding:0 10px;
  box-sizing:border-box;
}

button{
  min-height:42px;
  font-size:16px;
  margin:6px;
  padding:0 14px;
}

.section{
  max-width:900px;
  margin:18px auto;
  border:1px solid #ccc;
  border-radius:8px;
  padding:12px;
  text-align:left;
}

.siteTitle{
  font-size:22px;
  font-weight:bold;
  margin:14px 0 8px 0;
}

.deptBlock{
  border:1px solid #ddd;
  border-radius:8px;
  margin:10px 0;
  overflow:hidden;
}

.deptHeader{
  background:#f2f2f2;
  padding:12px;
  font-weight:bold;
}

.deptBody{
  padding:8px 12px 12px 12px;
}

.staffRow{
  border:1px solid #e0e0e0;
  border-radius:6px;
  margin:8px 0;
  padding:10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}

.staffLeft{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  min-width:220px;
}

.statusText{
  font-weight:bold;
}

.smallText{
  font-size:14px;
  color:#555;
}

.searchRow{
  border:1px solid #ddd;
  border-radius:6px;
  margin:8px auto;
  padding:10px;
  max-width:700px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  text-align:left;
}

.infoBox{
  max-width:900px;
  margin:12px auto;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  background:#fafafa;
}

</style>
</head>

<body>

<h1>Shift Roster</h1>

<div class="infoBox" id="activeShiftInfo">
No shift activated yet.
</div>

<div class="section" style="text-align:center;">

<select id="shift">
<option value="Days">Days</option>
<option value="Nights">Nights</option>
</select>

<select id="team">
<option value="A">Shift A</option>
<option value="B">Shift B</option>
</select>

<br>

<button onclick="loadShiftStaff()">Load Shift Staff</button>
<button onclick="saveShiftRoster()">Save Shift Roster</button>

</div>

<div class="section" style="text-align:center;">

<h2>Search Staff</h2>

<input id="searchBox" placeholder="Search name" onkeyup="searchStaff()">

<div id="searchResults"></div>

</div>

<div class="section">

<h2 style="text-align:center;">Loaded Shift Staff</h2>

<div id="loadedSummary" class="smallText" style="text-align:center;">
Nothing loaded yet.
</div>

<div id="loadedStaff"></div>

</div>

<div class="section">

<h2 style="text-align:center;">Staff Currently On Site</h2>

<div id="rosterSummary" class="smallText" style="text-align:center;">
No one currently added.
</div>

<div id="roster"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
  authDomain: "shunt-queue.firebaseapp.com",
  databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "shunt-queue",
  storageBucket: "shunt-queue.appspot.com",
  messagingSenderId: "773776993625",
  appId: "1:773776993625:web:2082ee7a38be041bee7048"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const staffRef = ref(db,"fireStaff");
const rosterRef = ref(db,"activeShift");
const shiftInfoRef = ref(db,"shiftInfo");

let staffData={}
let rosterData={}
let loadedCandidates=[]

onValue(staffRef,(snap)=>{
 staffData=snap.val()||{}
})

onValue(rosterRef,(snap)=>{
 rosterData=snap.val()||{}
 renderRoster()
 renderSearchResults()
})

function getRosterNames(){
 const names=[]
 for(const id in rosterData){
   names.push((rosterData[id].name||"").toLowerCase())
 }
 return names
}

function isAlreadyOnRoster(name){
 return getRosterNames().includes(name.toLowerCase())
}

function renderRoster(){

 const list=document.getElementById("roster")
 list.innerHTML=""

 const rosterArray=[]

 for(const id in rosterData){

  rosterArray.push({
   id:id,
   name:rosterData[id].name,
   department:rosterData[id].department,
   site:rosterData[id].site
  })

 }

 document.getElementById("rosterSummary").innerText =
 rosterArray.length===0
 ? "No one currently added."
 : rosterArray.length+" currently on site."

 rosterArray.forEach(person=>{

  const row=document.createElement("div")
  row.className="staffRow"

  const left=document.createElement("div")
  left.className="staffLeft"
  left.innerHTML="<strong>"+person.name+"</strong>"

  const removeBtn=document.createElement("button")
  removeBtn.innerText="Remove"

  removeBtn.onclick=function(){
   remove(ref(db,"activeShift/"+person.id))
  }

  row.appendChild(left)
  row.appendChild(removeBtn)

  list.appendChild(row)

 })

}

window.loadShiftStaff=function(){

 const shift=document.getElementById("shift").value
 const team=document.getElementById("team").value

 const loaded=[]

 for(const id in staffData){

  const p=staffData[id]

  if(p.shift===shift && p.team===team){

   loaded.push(p)

  }

 }

 loadedCandidates=loaded

 document.getElementById("loadedSummary").innerText =
 loaded.length+" staff loaded"

 const list=document.getElementById("loadedStaff")
 list.innerHTML=""

 loaded.forEach(p=>{

  const row=document.createElement("div")
  row.className="staffRow"

  const left=document.createElement("div")
  left.className="staffLeft"

  const checkbox=document.createElement("input")
  checkbox.type="checkbox"
  checkbox.dataset.name=p.name
  checkbox.dataset.department=p.department
  checkbox.dataset.site=p.site

  const text=document.createElement("div")
  text.innerHTML="<strong>"+p.name+"</strong>"

  left.appendChild(checkbox)
  left.appendChild(text)

  row.appendChild(left)

  list.appendChild(row)

 })

}

window.saveShiftRoster=function(){

 const shift=document.getElementById("shift").value
 const team=document.getElementById("team").value

 const checkboxes=document.querySelectorAll("#loadedStaff input[type='checkbox']")
 const rosterNames=getRosterNames()

 checkboxes.forEach(box=>{

  if(box.checked){

   const lower=box.dataset.name.toLowerCase()

   if(!rosterNames.includes(lower)){

    push(rosterRef,{
     name:box.dataset.name,
     department:box.dataset.department,
     site:box.dataset.site,
     safe:false
    })

   }

  }

 })

 set(shiftInfoRef,{
  shift:shift,
  team:team
 })

 alert("Shift roster saved")

}

window.searchStaff=function(){
 renderSearchResults()
}

function renderSearchResults(){

 const search=document.getElementById("searchBox").value.toLowerCase()
 const results=document.getElementById("searchResults")

 results.innerHTML=""

 if(search.length<2)return

 for(const id in staffData){

  const p=staffData[id]

  if((p.name||"").toLowerCase().includes(search)){

   const row=document.createElement("div")
   row.className="searchRow"

   const text=document.createElement("div")
   text.innerHTML="<strong>"+p.name+"</strong><br><span class='smallText'>"+p.department+"</span>"

   const right=document.createElement("div")

   if(isAlreadyOnRoster(p.name)){

    right.innerHTML="<span class='statusText'>✔ Already on shift</span>"

   }else{

    const btn=document.createElement("button")
    btn.innerText="Add"

    btn.onclick=function(){

     push(rosterRef,{
      name:p.name,
      department:p.department,
      site:p.site,
      safe:false
     })

    }

    right.appendChild(btn)

   }

   row.appendChild(text)
   row.appendChild(right)

   results.appendChild(row)

  }

 }

}

</script>

</body>
</html>
