<!DOCTYPE html>
<html>
<head>
<title>Fire Roll Call</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
margin:0;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
margin-top:0;
}

.statusBanner{
text-align:center;
font-size:26px;
font-weight:bold;
padding:14px;
border-radius:10px;
margin:10px auto 20px auto;
max-width:900px;
color:white;
}

.safeBanner{
background:#4CAF50;
}

.missingBanner{
background:#d32f2f;
}

.headerBox{
max-width:900px;
margin:0 auto 20px auto;
padding:12px;
background:white;
border:1px solid #ccc;
border-radius:8px;
text-align:center;
}

.counts{
font-size:20px;
margin-top:6px;
}

.resetBtn{
margin-top:10px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:#ff9800;
cursor:pointer;
}

.section{
max-width:900px;
margin:20px auto;
}

.siteTitle{
font-size:24px;
font-weight:bold;
margin:18px 0 8px 0;
}

.deptBlock{
border:1px solid #ccc;
border-radius:8px;
margin:10px 0;
background:white;
overflow:hidden;
}

.deptHeader{
background:#ececec;
padding:12px;
font-weight:bold;
cursor:pointer;
}

.deptBody{
padding:10px;
display:none;
}

.personRow{
border:1px solid #ddd;
border-radius:6px;
margin:8px 0;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
gap:10px;
flex-wrap:wrap;
}

.personName{
font-weight:bold;
font-size:16px;
}

.safeBtn{
padding:8px 14px;
border:none;
border-radius:6px;
background:#e0e0e0;
}

.safeBtn.safe{
background:#4CAF50;
color:white;
}

.missingBox{
max-width:900px;
margin:20px auto;
padding:12px;
background:white;
border:1px solid #ccc;
border-radius:8px;
}

.missingTitle{
font-weight:bold;
margin-bottom:6px;
}

@media (max-width:700px){
.personRow{
flex-direction:column;
align-items:flex-start;
}

.safeBtn{
margin-top:8px;
width:100%;
}
}
</style>
</head>

<body>

<h1>🔥 Fire Roll Call</h1>

<div id="statusBanner" class="statusBanner missingBanner">
Waiting for drill
</div>

<div class="headerBox">
<div id="shiftDisplay">Shift: —</div>

<div class="counts">
Accounted <span id="safeCount">0</span> /
<span id="totalCount">0</span>
</div>

<div id="drillTimer" style="margin-top:8px;font-weight:bold;">Drill not started</div>

<button class="resetBtn" onclick="startDrill()">START DRILL</button>
</div>

<div id="board" class="section"></div>

<div class="missingBox">
<div class="missingTitle">Missing</div>
<div id="missingList">None</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, onValue, update, set, push, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig={
apiKey:"AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain:"shunt-queue.firebaseapp.com",
databaseURL:"https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"shunt-queue",
storageBucket:"shunt-queue.appspot.com",
messagingSenderId:"773776993625",
appId:"1:773776993625:web:2082ee7a38be041bee7048"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const rosterRef=ref(db,"activeShift")
const shiftInfoRef=ref(db,"shiftInfo")
const currentDrillRef=ref(db,"currentDrill")
const reportsRef=ref(db,"drillReports")

let rosterData={}
let openDepartments={}
let currentDrill={}
let shiftInfo={}
let timerInterval=null

onValue(shiftInfoRef,(snap)=>{
shiftInfo=snap.val()||{}
if(shiftInfo.shift){
document.getElementById("shiftDisplay").innerText=
"Shift: "+shiftInfo.shift+" Shift "+shiftInfo.team
}else{
document.getElementById("shiftDisplay").innerText="Shift: —"
}
})

onValue(currentDrillRef,(snap)=>{
currentDrill=snap.val()||{}
renderTimer()
})

onValue(rosterRef,(snapshot)=>{
rosterData=snapshot.val()||{}
renderBoard()
checkForDrillCompletion()
})

function formatDateTime(ts){
const d=new Date(ts)
return d.toLocaleString()
}

function formatDuration(ms){
const totalSeconds=Math.floor(ms/1000)
const minutes=Math.floor(totalSeconds/60)
const seconds=totalSeconds%60
return minutes+"m "+seconds+"s"
}

function renderTimer(){
const timer=document.getElementById("drillTimer")

if(timerInterval){
clearInterval(timerInterval)
timerInterval=null
}

if(currentDrill.startTime && !currentDrill.endTime){
const updateTimer=()=>{
const now=Date.now()
timer.innerText="Drill running: "+formatDuration(now-currentDrill.startTime)
}
updateTimer()
timerInterval=setInterval(updateTimer,1000)
}else if(currentDrill.startTime && currentDrill.endTime){
timer.innerText="Last drill: "+formatDuration(currentDrill.endTime-currentDrill.startTime)
}else{
timer.innerText="Drill not started"
}
}

function renderBoard(){

const board=document.getElementById("board")
board.innerHTML=""

const grouped={}
const missing=[]

let safeCount=0
let total=0

for(const id in rosterData){

const p=rosterData[id]

const site=p.site||"Unknown"
const dept=p.department||"Unknown"

if(!grouped[site]) grouped[site]={}
if(!grouped[site][dept]) grouped[site][dept]=[]

grouped[site][dept].push({
id:id,
name:p.name,
safe:p.safe
})

total++

if(p.safe){
safeCount++
}else{
missing.push(p.name)
}

}

document.getElementById("safeCount").innerText=safeCount
document.getElementById("totalCount").innerText=total
document.getElementById("missingList").innerText=missing.length?missing.join(", "):"None"

const banner=document.getElementById("statusBanner")

if(total>0 && safeCount===total){
banner.className="statusBanner safeBanner"
banner.innerText="🟢 ALL ACCOUNTED FOR"
}else if(total===0){
banner.className="statusBanner missingBanner"
banner.innerText="No active roster loaded"
}else{
banner.className="statusBanner missingBanner"
banner.innerText="🔴 "+(total-safeCount)+" MISSING"
}

const siteOrder=["BDC","CDC","YARD"]

siteOrder.forEach(site=>{

if(!grouped[site]) return

const siteTitle=document.createElement("div")
siteTitle.className="siteTitle"
siteTitle.innerText=site
board.appendChild(siteTitle)

Object.keys(grouped[site]).sort().forEach(dept=>{

const staffList=grouped[site][dept]

const deptKey=site+"-"+dept

const deptBlock=document.createElement("div")
deptBlock.className="deptBlock"

const deptHeader=document.createElement("div")
deptHeader.className="deptHeader"

const deptBody=document.createElement("div")
deptBody.className="deptBody"

if(openDepartments[deptKey]){
deptBody.style.display="block"
deptHeader.innerText="▲ "+dept+" ("+staffList.length+")"
}else{
deptBody.style.display="none"
deptHeader.innerText="▼ "+dept+" ("+staffList.length+")"
}

deptHeader.onclick=()=>{

if(openDepartments[deptKey]){
openDepartments[deptKey]=false
deptBody.style.display="none"
deptHeader.innerText="▼ "+dept+" ("+staffList.length+")"
}else{
openDepartments[deptKey]=true
deptBody.style.display="block"
deptHeader.innerText="▲ "+dept+" ("+staffList.length+")"
}

}

staffList
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(person=>{

const row=document.createElement("div")
row.className="personRow"

const name=document.createElement("div")
name.className="personName"
name.innerText=person.name

const btn=document.createElement("button")
btn.className="safeBtn"+(person.safe?" safe":"")
btn.innerText=person.safe?"SAFE":"MARK SAFE"

btn.onclick=(e)=>{
e.stopPropagation()
toggleSafe(person.id,person.safe,person.name)
}

row.onclick=()=>{
toggleSafe(person.id,person.safe,person.name)
}

row.appendChild(name)
row.appendChild(btn)

deptBody.appendChild(row)

})

deptBlock.appendChild(deptHeader)
deptBlock.appendChild(deptBody)
board.appendChild(deptBlock)

})

})

}

async function toggleSafe(id,current,name){

const updates={
safe:!current
}

if(!current && currentDrill.startTime){
updates.safeTime=Date.now()
}

if(current){
updates.safeTime=null
}

await update(ref(db,"activeShift/"+id),updates)
}

window.startDrill=async function(){

if(!confirm("Start new drill and clear all SAFE ticks?")) return

const startTime=Date.now()

for(const id in rosterData){
await update(ref(db,"activeShift/"+id),{
safe:false,
safeTime:null
})
}

await set(currentDrillRef,{
startTime:startTime,
endTime:null,
shift:shiftInfo.shift||"",
team:shiftInfo.team||"",
staffTotal:Object.keys(rosterData).length
})
}

async function checkForDrillCompletion(){

const ids=Object.keys(rosterData)

if(ids.length===0) return
if(!currentDrill.startTime) return
if(currentDrill.endTime) return

let allSafe=true

for(const id of ids){
if(!rosterData[id].safe){
allSafe=false
break
}
}

if(!allSafe) return

const endTime=Date.now()
const reportStaff=[]

ids.forEach(id=>{
reportStaff.push({
name:rosterData[id].name||"",
site:rosterData[id].site||"",
department:rosterData[id].department||"",
safeTime:rosterData[id].safeTime||null
})
})

const reportData={
shift:currentDrill.shift||shiftInfo.shift||"",
team:currentDrill.team||shiftInfo.team||"",
startTime:currentDrill.startTime,
endTime:endTime,
totalTimeMs:endTime-currentDrill.startTime,
totalTimeText:formatDuration(endTime-currentDrill.startTime),
staffTotal:ids.length,
staff:reportStaff
}

await push(reportsRef,reportData)

await update(currentDrillRef,{
endTime:endTime
})
}

</script>

</body>
</html>
