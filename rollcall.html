
<!DOCTYPE html>
<html>
<head>
<title>Fire Roll Call</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:20px;
  background:#f7f7f7;
}

h1{
  text-align:center;
  margin-top:0;
}

.headerBox{
  max-width:1000px;
  margin:10px auto 20px auto;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  background:white;
  text-align:center;
}

.counts{
  font-size:20px;
  margin-top:8px;
}

.section{
  max-width:1000px;
  margin:18px auto;
}

.siteTitle{
  font-size:24px;
  font-weight:bold;
  margin:16px 0 8px 0;
}

.deptBlock{
  border:1px solid #ccc;
  border-radius:8px;
  margin:10px 0;
  overflow:hidden;
  background:white;
}

.deptHeader{
  background:#ececec;
  padding:12px;
  font-weight:bold;
}

.deptBody{
  padding:8px 12px 12px 12px;
}

.personRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid #ddd;
  border-radius:6px;
  padding:10px;
  margin:8px 0;
  flex-wrap:wrap;
}

.personName{
  font-weight:bold;
}

.safeBtn{
  background:#e0e0e0;
  border:none;
  padding:10px 16px;
  font-size:15px;
  border-radius:6px;
  cursor:pointer;
}

.safeBtn.safe{
  background:#4CAF50;
  color:white;
}

.resetBtn{
  background:#ff9800;
  border:none;
  padding:12px 20px;
  font-size:16px;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

.missingBox{
  max-width:1000px;
  margin:20px auto;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  background:white;
}

.missingTitle{
  font-weight:bold;
  margin-bottom:6px;
}

@media (max-width:700px){
  .personRow{
    flex-direction:column;
    align-items:flex-start;
  }
  .safeBtn{
    width:100%;
    margin-top:8px;
  }
}
</style>
</head>

<body>

<h1>🔥 Fire Roll Call</h1>

<div class="headerBox">
  <div id="shiftDisplay">Shift: —</div>
  <div class="counts">
    Accounted: <span id="safeCount">0</span> /
    <span id="totalCount">0</span>
  </div>

  <button class="resetBtn" onclick="resetDrill()">START DRILL</button>
</div>

<div id="board" class="section"></div>

<div class="missingBox">
  <div class="missingTitle">Missing</div>
  <div id="missingList">None</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {
apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"
}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const rosterRef = ref(db,"activeShift")
const shiftInfoRef = ref(db,"shiftInfo")

let rosterData = {}

onValue(shiftInfoRef,(snap)=>{
const data=snap.val()||{}
if(data.shift){
document.getElementById("shiftDisplay").innerText =
"Shift: "+data.shift+" Shift "+data.team
}
})

onValue(rosterRef,(snapshot)=>{

rosterData=snapshot.val()||{}

renderBoard()

})

function renderBoard(){

const board=document.getElementById("board")
board.innerHTML=""

const missing=[]
let safeCount=0
let total=0

const grouped={}

for(const id in rosterData){

const p=rosterData[id]

const site=p.site||"Unknown"
const dept=p.department||"Unknown"

if(!grouped[site]) grouped[site]={}
if(!grouped[site][dept]) grouped[site][dept]=[]

grouped[site][dept].push({
id:id,
name:p.name,
safe:p.safe
})

total++

if(p.safe){
safeCount++
}else{
missing.push(p.name)
}

}

document.getElementById("safeCount").innerText=safeCount
document.getElementById("totalCount").innerText=total

const missingList=document.getElementById("missingList")
missingList.innerText=missing.length?missing.join(", "):"None"

Object.keys(grouped).sort().forEach(site=>{

const siteTitle=document.createElement("div")
siteTitle.className="siteTitle"
siteTitle.innerText=site
board.appendChild(siteTitle)

Object.keys(grouped[site]).sort().forEach(dept=>{

const deptBlock=document.createElement("div")
deptBlock.className="deptBlock"

const deptHeader=document.createElement("div")
deptHeader.className="deptHeader"
deptHeader.innerText=dept

const deptBody=document.createElement("div")
deptBody.className="deptBody"

grouped[site][dept]
.sort((a,b)=>a.name.localeCompare(b.name))
.forEach(person=>{

const row=document.createElement("div")
row.className="personRow"

const name=document.createElement("div")
name.className="personName"
name.innerText=person.name

const btn=document.createElement("button")
btn.className="safeBtn"+(person.safe?" safe":"")
btn.innerText=person.safe?"SAFE":"MARK SAFE"

btn.onclick=()=>{
update(ref(db,"activeShift/"+person.id),{
safe:!person.safe
})
}

row.appendChild(name)
row.appendChild(btn)

deptBody.appendChild(row)

})

deptBlock.appendChild(deptHeader)
deptBlock.appendChild(deptBody)
board.appendChild(deptBlock)

})

})

}

window.resetDrill=function(){

if(!confirm("Start new drill and clear all SAFE ticks?")) return

for(const id in rosterData){
update(ref(db,"activeShift/"+id),{safe:false})
}

}

</script>

</body>
</html>
