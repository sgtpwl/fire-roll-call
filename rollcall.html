<!DOCTYPE html>
<html>
<head>
<title>Roll Call</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
padding:20px;
text-align:center;
}

h1{
margin-bottom:20px;
}

#counter{
font-size:22px;
margin-bottom:20px;
}

.person{
width:100%;
max-width:400px;
margin:10px auto;
padding:15px;
font-size:20px;
border:1px solid #ccc;
border-radius:6px;
cursor:pointer;
background:#f2f2f2;
}

.safe{
background:#4CAF50;
color:white;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<div id="counter">0 / 0 accounted</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const params = new URLSearchParams(window.location.search)
const area = params.get("area")

document.getElementById("title").innerText = area.replace("_"," ")

const staffRef = ref(db,"fireStaff")

const list = document.getElementById("list")

let accounted = 0
let total = 0

onValue(staffRef,(snapshot)=>{

const data = snapshot.val()

list.innerHTML=""

accounted = 0
total = 0

for(const id in data){

if(data[id].area === area){

total++

const div = document.createElement("div")
div.className="person"
div.innerText=data[id].name

div.onclick=function(){

if(!div.classList.contains("safe")){
div.classList.add("safe")
accounted++
}else{
div.classList.remove("safe")
accounted--
}

update()

}

list.appendChild(div)

}

}

update()

})

function update(){

document.getElementById("counter").innerText =
accounted + " / " + total + " accounted"

}

</script>

</body>
</html>
