<!DOCTYPE html>
<html>
<head>
<title>Fire Staff Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
padding:20px;
text-align:center;
}

input, select{
width:260px;
height:40px;
font-size:16px;
margin:8px;
}

button{
height:40px;
font-size:16px;
margin:10px;
}

.staffRow{
margin:8px;
padding:10px;
border:1px solid #ccc;
font-size:15px;
}

</style>

</head>

<body>

<h1>Staff Management</h1>

<input id="name" placeholder="Name">

<br>

<select id="site">
<option value="BDC">BDC</option>
<option value="CDC">CDC</option>
<option value="YARD">Yard</option>
</select>

<br>

<input id="department" placeholder="Department (Picking, MHE etc)">

<br>

<input id="role" placeholder="Role (GWO, Supervisor etc)">

<br>

<select id="shift">
<option value="Days">Days</option>
<option value="Nights">Nights</option>
</select>

<br>

<select id="team">
<option value="A">Team A</option>
<option value="B">Team B</option>
</select>

<br>

<button id="addBtn">Add Staff</button>

<h2>Current Staff</h2>

<div id="staffList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const staffRef = ref(db,"fireStaff")

document.getElementById("addBtn").onclick = function(){

const name = document.getElementById("name").value
const site = document.getElementById("site").value
const department = document.getElementById("department").value
const role = document.getElementById("role").value
const shift = document.getElementById("shift").value
const team = document.getElementById("team").value

if(name==="") return

push(staffRef,{
name:name,
site:site,
department:department,
role:role,
shift:shift,
team:team
})

document.getElementById("name").value=""

}

onValue(staffRef,(snapshot)=>{

const data = snapshot.val()

const list = document.getElementById("staffList")
list.innerHTML=""

if(!data){
list.innerHTML="No staff added yet"
return
}

for(const id in data){

const row = document.createElement("div")
row.className="staffRow"

row.innerHTML =
data[id].name + " — " +
data[id].site + " / " +
data[id].department + " / " +
data[id].shift + " " +
data[id].team +

' <button onclick="deleteStaff(\''+id+'\')">Delete</button>'

list.appendChild(row)

}

})

window.deleteStaff = function(id){

remove(ref(db,"fireStaff/"+id))

}

</script>

</body>
</html>
