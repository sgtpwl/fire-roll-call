<!DOCTYPE html>
<html>
<head>
<title>Fire Staff Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
padding:20px;
text-align:center;
}

input, select{
width:260px;
height:40px;
font-size:16px;
margin:8px;
}

button{
height:40px;
font-size:16px;
margin:10px;
}

.staffRow{
margin:8px;
padding:10px;
border:1px solid #ccc;
font-size:15px;
}

</style>
</head>

<body>

<h1>Staff Management</h1>

<input id="name" placeholder="Name">

<br>

<select id="department" onchange="updateRole()">

<option value="">Select Department</option>

<option value="BDC Picking">BDC Picking</option>
<option value="BDC MHE">BDC MHE</option>
<option value="BDC Despatch">BDC Despatch</option>
<option value="BDC Inbound">BDC Inbound</option>
<option value="BDC Stock">BDC Stock Team</option>

<option value="CDC Picking">CDC Picking</option>
<option value="CDC MHE">CDC MHE</option>
<option value="CDC Despatch">CDC Despatch</option>
<option value="CDC Inbound">CDC Inbound</option>
<option value="CDC Stock">CDC Stock Team</option>

<option value="Supervisor">Supervisor</option>
<option value="Manager">Manager</option>

<option value="Yard Shunters">Yard Shunters</option>
<option value="Yard Gatehouse">Yard Gatehouse</option>

<option value="Compliance Trainer">Compliance Trainer</option>

</select>

<br>

<select id="role">
<option>Select Role</option>
</select>

<br>

<select id="shift">
<option value="Days">Days</option>
<option value="Nights">Nights</option>
</select>

<br>

<select id="team">
<option value="A">Team A</option>
<option value="B">Team B</option>
</select>

<br>

<button id="addBtn">Add Staff</button>

<h2>Current Staff</h2>

<div id="staffList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyACWPazBK_TFoYIuuI0iNzy_9zw-CKA7m4",
authDomain: "shunt-queue.firebaseapp.com",
databaseURL: "https://shunt-queue-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "shunt-queue",
storageBucket: "shunt-queue.appspot.com",
messagingSenderId: "773776993625",
appId: "1:773776993625:web:2082ee7a38be041bee7048"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const staffRef = ref(db,"fireStaff")

document.getElementById("addBtn").onclick = function(){

const name = document.getElementById("name").value
const department = document.getElementById("department").value
const role = document.getElementById("role").value
const shift = document.getElementById("shift").value
const team = document.getElementById("team").value

if(name==="") return

push(staffRef,{
name:name,
department:department,
role:role,
shift:shift,
team:team
})

document.getElementById("name").value=""

}

onValue(staffRef,(snapshot)=>{

const data = snapshot.val()

const list = document.getElementById("staffList")
list.innerHTML=""

if(!data){
list.innerHTML="No staff added yet"
return
}

for(const id in data){

const row = document.createElement("div")
row.className="staffRow"

row.innerHTML =
data[id].name + " — " +
data[id].department + " — " +
data[id].role + " — " +
data[id].shift + " " +
data[id].team +

' <button onclick="deleteStaff(\''+id+'\')">Delete</button>'

list.appendChild(row)

}

})

window.deleteStaff = function(id){
remove(ref(db,"fireStaff/"+id))
}

</script>

<script>

function updateRole(){

const dept = document.getElementById("department").value
const roleSelect = document.getElementById("role")

roleSelect.innerHTML=""

if(dept.includes("Picking") || dept.includes("MHE") || dept.includes("Despatch") || dept.includes("Inbound")){
roleSelect.innerHTML='<option value="GWO">GWO</option>'
}

else if(dept.includes("Stock")){
roleSelect.innerHTML='<option value="Stock Controller">Stock Controller</option>'
}

else if(dept==="Supervisor"){
roleSelect.innerHTML='<option value="Supervisor">Supervisor</option>'
}

else if(dept==="Manager"){
roleSelect.innerHTML='<option value="Manager">Manager</option>'
}

else if(dept==="Yard Shunters"){
roleSelect.innerHTML='<option value="Shunter">Shunter</option>'
}

else if(dept==="Yard Gatehouse"){
roleSelect.innerHTML='<option value="Gatehouse">Gatehouse</option>'
}

else if(dept==="Compliance Trainer"){
roleSelect.innerHTML='<option value="Trainer">Trainer</option>'
}

}

</script>

</body>
</html>
